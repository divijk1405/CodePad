server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/codepad
    username: codepad
    password: codepad
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

codepad:
  room:
    ttl-hours: 24
  execution:
    timeout-seconds: 5
    memory-limit-mb: 256
